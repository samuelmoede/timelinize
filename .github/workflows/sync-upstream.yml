name: Sync fork with upstream

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch: {}

env:
  UPSTREAM_REPO: https://github.com/timelinize/timelinize.git

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout fork main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream "${UPSTREAM_REPO}"

      - name: Fetch upstream main
        run: git fetch upstream main

      - name: Merge upstream/main into main
        id: merge
        run: |
          if git merge --no-edit upstream/main; then
            echo "Merge completed cleanly."
          else
            git merge --abort
            echo "::error title=Sync failed::Merge conflict between upstream/main and your fork's main. Resolve manually: fetch upstream, merge locally, fix conflicts, then push." >> "$GITHUB_STEP_SUMMARY"
            echo "::error::Merge conflict while merging upstream/main into main. Aborted, nothing was overwritten. Please resolve manually."
            exit 1
          fi

      - name: Push updated main
        run: git push origin main
