name: Build and publish Docker image (main)

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: samuelmoede/timelinize-main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Portainer sits on a private LAN IP (192.168.178.20) that GitHub-hosted
  # cloud runners can't reach, and Portainer CE has no stack/container
  # webhooks (Business Edition only) to trigger this from outside. So this
  # job runs on a self-hosted runner living on the same LAN as Portainer
  # (see .github/README-runner.md) and talks to the REST API directly:
  # fetch the stack's current compose file and env, then PUT it back with
  # PullImage=true to force a pull of the freshly-pushed :latest image and
  # recreate the stack. See https://github.com/portainer/portainer-skills.
  redeploy:
    needs: build-and-push
    runs-on: [self-hosted, synology]
    steps:
      - name: Redeploy stack via Portainer API
        run: |
          set -euo pipefail
          if [ -z "${PORTAINER_URL}" ] || [ -z "${PORTAINER_API_TOKEN}" ] || [ -z "${PORTAINER_STACK_ID}" ] || [ -z "${PORTAINER_ENDPOINT_ID}" ]; then
            echo "PORTAINER_URL, PORTAINER_API_TOKEN, PORTAINER_STACK_ID and/or PORTAINER_ENDPOINT_ID secrets are not set, skipping Portainer redeploy." >&2
            exit 1
          fi

          FILE_CONTENT=$(curl -fsSL -H "X-API-Key: ${PORTAINER_API_TOKEN}" \
            "${PORTAINER_URL}/api/stacks/${PORTAINER_STACK_ID}/file" | jq -r '.StackFileContent')

          STACK_ENV=$(curl -fsSL -H "X-API-Key: ${PORTAINER_API_TOKEN}" \
            "${PORTAINER_URL}/api/stacks/${PORTAINER_STACK_ID}?endpointId=${PORTAINER_ENDPOINT_ID}" | jq -c '.Env // []')

          jq -n --arg content "$FILE_CONTENT" --argjson env "$STACK_ENV" \
            '{StackFileContent: $content, Env: $env, PullImage: true, RepullImageAndRedeploy: true, Prune: false}' \
            > /tmp/portainer-update.json

          curl -fsSL -X PUT \
            -H "X-API-Key: ${PORTAINER_API_TOKEN}" \
            -H "Content-Type: application/json" \
            "${PORTAINER_URL}/api/stacks/${PORTAINER_STACK_ID}?endpointId=${PORTAINER_ENDPOINT_ID}" \
            --data @/tmp/portainer-update.json
        env:
          PORTAINER_URL: ${{ secrets.PORTAINER_URL }}
          PORTAINER_API_TOKEN: ${{ secrets.PORTAINER_API_TOKEN }}
          PORTAINER_STACK_ID: ${{ secrets.PORTAINER_STACK_ID }}
          PORTAINER_ENDPOINT_ID: ${{ secrets.PORTAINER_ENDPOINT_ID }}
